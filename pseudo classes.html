<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .click{
            background-color: #006b17;
            width: 100px;
            height: 50px;
            border-radius: 10px;
        }
        .click:hover{
            background-color: rgb(94, 205, 94);
        }
        .click:active{
            background-color: black;
            color: white;
        }
        input:focus{
            background-color: greenyellow;
            height: 100px;
            border-radius: 10px;
        }
        a:link{
            color: red;
            
        }
        a:visited{
            color: green;
        }
    </style>
</head>
<body>
    <div>
    <button class="click">click</button>
    <input type="text">
    <a href="https://www.apple.com/in/iphone/">go to apple webiste</a>
    
    </div>
</body>
</html>

<html>
    <head>
        <title>webserver</title>
        <style>
            .container{
                display:grid;
                width: 100%;
                grid-template-columns:1fr 1fr;
                grid-template-rows: 100px 500px 100px;
            }
            .g-item1{
                background-color: red;
                grid-column: 1/3 ;
                grid-row: 1/2;
                
            }
            .g-item2{
                background-color: aqua;
                grid-column: 1/2;
                grid-row: 2/3;
                
            }
            .g-item3{
                background-color: purple;
                grid-column: 2/3;
                grid-row: 2/3;
               
            }
            .g-item4{
                background-color: blue;
                grid-column: 1/3;
                grid-row: 3/4;
            }
            
        </style>
    </head>
    <body>
        <div class="container">
            <div class="g-item1">1</div>
            <div class="g-item2">2</div>
            <div class="g-item3">3</div>
            <div class="g-item4">4</div>
        </div>
    </body>
</html>

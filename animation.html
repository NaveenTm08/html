<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .bc{
            background-color: blueviolet;
            width: 200px;
            height: 200px;
            border-radius: 100px;
            animation: circle 5s ;
        }
        @keyframes circle{
            0%,100%{margin-left: 0px;}
            50%{margin-left: 500px;}
        }


        .ab{
            border: 1px solid red;
            width: 200px;
            height: 200px;
            background-color: aqua;
            transition: transform 0.5s ;
        }
        .ab:hover{
            background-color: blue;
            border-radius: 100px;
            transform: rotate(180deg);
            box-shadow: 0px 0px 100px 50px red;
            transform: scale(1.2);
            cursor: pointer;
            
        }
        .alfha{
            background-color: blueviolet;
            width: 200px;
            height: 200px;
            border: 1px solid yellow;
            animation: clr 5s infinite ;
        }
        @keyframes clr {
            0%{background-color: blue;border-radius: 50%;}
            25%{background-color: red;}
            50%{background-color: yellow;width: 300px;}
            75%{background-color: green;}
            100%{background-color: blueviolet;border-radius: 50%;}
            
        }
        .omega{
            
            width: 100px;
            height: 100px;
            animation: rotate 1s infinite;
            border-top: 2px solid green;
            border-left: 2px solid red;
            border-radius: 50%;
        }
         @keyframes rotate {
            0%{transform: rotate(0deg);}
            33%{transform: rotate(120deg);}
            66%{transform: rotate(240deg);}
            100%{transform: rotate(360deg);}
            
         }


        
    </style>
</head>
<body>

    <div class="bc">
        <div>1</div>
    </div>

    <div class="ab">
        <div class="a1">1</div>
   </div>
   <div class="alfha">
    <div class="a2">2</div>
   </div>
   <div class="omega">

   </div>
</body>
</html>

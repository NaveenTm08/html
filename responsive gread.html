<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            margin: 0;
        }
        .object{
            display: grid;
            width: 100%;
            background-color: aqua;
            grid-template-columns: 3fr 6fr 3fr;
            grid-template-rows: 100px 500px 100px;
            
        }
        .a1{
            grid-row: 1/2;
            grid-column: 1/4;
            border: 1px solid;
        }
        .a2{
            grid-row:2/3 ;
            grid-column:1/2 ;
            border: 1px solid;
        }
        .a3{
            grid-column: 2/3;
            grid-row: 2/3;
            border: 1px solid;
        }
        .a4{
            grid-column:3/4 ;
            grid-row: 2/3;
            border: 1px solid red;
        }
        .a5{
            grid-column:1/4 ;
            grid-row:3/5 ;
            border: 1px solid green;
        }
        @media(max-width:800px){
            .object{
                display: grid;
                width: 100%;
                grid-template-columns: 1fr 1fr 2fr;
                grid-template-rows: 100px 500px 100px;
                background-color: brown;
            }
            .a1{
                grid-column: 1/4;
                grid-row: 1/2;
                background-color: yellow;
            }
            .a2{
                grid-column: 1/2;
                grid-row: 2/3;
                background-color: aqua;
            }
            .a3{
                grid-column: 2/4;
                grid-row: 2/3;
                background-color:red;
            }
            .a4{
                grid-column: 3/4;
                grid-row: 3/4;
                background-color: rgb(42, 63, 165);
            }
        }
            @media(max-width: 400px){
                .object{
                    display: grid;
                    width: 100%;
                    grid-template-columns: 1fr 1fr ;
                    grid-template-rows: 100px 500px 50px 50px;
                }
                .a1{
                    grid-column: 1/3;
                    grid-row: 1/1;
                    background-color: aqua;
                }
                .a2{
                    grid-column: 1/3;
                    grid-row: 2/3;
                    background-color: blue;
                }
                .a3{
                    grid-column: 1/3;
                    grid-row: 3/4;
                    background-color: brown;
                }
                .a4{
                    grid-column: 1/2;
                    grid-row: 4/5;
                    background-color: red;
                }
                .a5{
                    grid-column: 2/3;
                    grid-row: 4/5;
                }
            }
    </style>
</head>
<body>
    <div class="object">
        <div class="a1">1</div>
        <div class="a2">2</div>
        <div class="a3">3</div>
        <div class="a4">4</div>
        <div class="a5">5</div>

    </div>
    
</body>
</html>
